# Version pins for the sample apps' externally-resolving flavors. Both keys
# are managed by python-semantic-release via build_command in
# ci/config/semantic-release.toml; release-cycle routing:
#
#   prerelease tag (vX.Y.Z-rc.N etc.) -> rcSdkVersion is rewritten
#   stable tag (vX.Y.Z)               -> stableSdkVersion is rewritten
#
# Each tag updates exactly one of these so a stable cut never drags rc
# forward and an rc cut never drags stable forward. Do not hand-edit
# during a release cycle.
#
#   rcSdkVersion     - current rc-cycle pin. The `rc` flavor resolves to
#                      ${rcSdkVersion}-SNAPSHOT on Maven Central Snapshots.
#   stableSdkVersion - last stable release. The `external` flavor resolves
#                      to this exact version on Maven Central.
rcSdkVersion=3.0.0-rc.15
stableSdkVersion=3.0.0
